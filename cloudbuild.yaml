substitutions:
  _SERVICE_NAME: myprofessor-stage
  _WORKER_NAME: myprofessor-byo-stage
  _DEPLOY_REGION: us-central1
  _AR_HOSTNAME: us-central1-docker.pkg.dev
  _AR_REPOSITORY: cloud-run-source-deploy

steps:
  # ── 1. Build backend image ──
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    args:
      - 'build'
      - '--target=backend'
      - '-t'
      - '${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:latest'
      - '.'

  # ── 2. Build worker image (parallel with backend) ──
  - name: 'gcr.io/cloud-builders/docker'
    id: build-worker
    waitFor: ['-']
    args:
      - 'build'
      - '--target=worker'
      - '-t'
      - '${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_WORKER_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_WORKER_NAME}:latest'
      - '.'

  # ── 3. Push backend image ──
  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - '${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}'

  # ── 4. Push worker image (parallel with backend push) ──
  - name: 'gcr.io/cloud-builders/docker'
    id: push-worker
    waitFor: ['build-worker']
    args:
      - 'push'
      - '--all-tags'
      - '${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_WORKER_NAME}'

  # ── 5. Deploy backend to Cloud Run ──
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: deploy-backend
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_DEPLOY_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--timeout=3600'
      - '--concurrency=25'
      - '--max-instances=5'
      - '--min-instances=0'
      - '--session-affinity'
      - '--add-cloudsql-instances=capacity-platform-dev:us-central1:capacity-stage'
      - '--network=default'
      - '--subnet=default'
      - '--vpc-egress=private-ranges-only'
      - '--set-env-vars=LLM_PROVIDER=openrouter,TUTOR_MODEL=anthropic/claude-opus-4-6,DB_HOST=10.5.32.3,DB_PORT=5432,DB_NAME=capacity,DB_USER=capacity_service_user,CORS_ORIGINS=https://stage.myprofessor.live,MATERIALS_BUCKET=capacity-materials,GOOGLE_CLIENT_ID_MYPROFESSOR=932228979922-61q7fmgjot8a9lrqjtehhk9onackionn.apps.googleusercontent.com,BYO_WORKER_EXTERNAL=true,MONGODB_DB=myprofessor'
      - '--set-secrets=ANTHROPIC_API_KEY=tutor_anthropic_api_key:latest,OPENROUTER_API_KEY=openrouter_api_key:latest,DB_PASSWORD=STAGE_DB_PASSWORD:latest,MONGODB_URI=myprofessor_mongodb_uri:latest,MOCKUP_JWT_SECRET=tutor_jwt_secret:latest,ELEVENLABS_API_KEY=tutor_elevenlabs_api_key:latest,GOOGLE_CLIENT_SECRET_MYPROFESSOR=google_client_secret_myprofessor:latest,QDRANT_URL=qdrant_url_myprofessor:latest,QDRANT_API_KEY=qdrant_api_key_myprofessor:latest'

  # ── 6. Deploy BYO worker to Cloud Run ──
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: deploy-worker
    waitFor: ['push-worker']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_WORKER_NAME}'
      - '--image=${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_WORKER_NAME}:${SHORT_SHA}'
      - '--region=${_DEPLOY_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=3600'
      - '--concurrency=1'
      - '--max-instances=2'
      - '--min-instances=0'
      - '--set-env-vars=MONGODB_DB=myprofessor,BYO_STORAGE=gcs,BYO_GCS_BUCKET=capacity-byo-uploads'
      - '--set-secrets=OPENROUTER_API_KEY=openrouter_api_key:latest,MONGODB_URI=myprofessor_mongodb_uri:latest,QDRANT_URL=qdrant_url_myprofessor:latest,QDRANT_API_KEY=qdrant_api_key_myprofessor:latest'

images:
  - '${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:latest'
  - '${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_WORKER_NAME}:${SHORT_SHA}'
  - '${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_WORKER_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE
