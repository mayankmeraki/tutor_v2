<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Ionic vs Covalent Bonding</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0e1a;color:#e8edf5;font-family:-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column}.bar{padding:10px 20px;border-bottom:1px solid rgba(148,163,184,0.12);display:flex;align-items:center;gap:12px}.bar h1{font-size:15px;font-weight:600;flex:1}.tag{font-size:10px;padding:3px 10px;border-radius:10px;background:rgba(139,92,246,0.12);color:#a78bfa;font-weight:700}.main{flex:1;min-height:0}.sub{padding:12px 24px;text-align:center;font-size:13px;color:#7a8ba8;border-top:1px solid rgba(148,163,184,0.12);min-height:46px}.sub b{color:#e8edf5}.beats{padding:10px 16px;display:flex;gap:6px;overflow-x:auto;border-top:1px solid rgba(148,163,184,0.12);background:#131a2b}.beat-btn{padding:5px 12px;border:1px solid rgba(148,163,184,0.12);background:rgba(51,65,85,0.3);color:#7a8ba8;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}.beat-btn:hover{border-color:#a78bfa;color:#e8edf5}.beat-btn.active{background:#a78bfa;border-color:#a78bfa;color:#fff}.beat-btn.done{background:rgba(52,211,153,0.1);color:#34d399}.auto-btn{padding:5px 14px;border:1px solid #34d399;background:#34d399;color:#fff;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;margin-left:auto}</style>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="shared.js"></script>
</head><body>
<div class="bar"><h1>Chemical Bonding — Ionic vs Covalent</h1><span class="tag">CHEMISTRY</span></div>
<div class="main" id="cc"></div>
<div class="sub" id="subtitle">Hit <b>Play All</b> to see two types of chemical bonds form.</div>
<div class="beats">
  <button class="beat-btn" data-beat="0">1. Two atoms</button>
  <button class="beat-btn" data-beat="1">2. Electron shells</button>
  <button class="beat-btn" data-beat="2">3. Na gives electron</button>
  <button class="beat-btn" data-beat="3">4. Ionic bond!</button>
  <button class="beat-btn" data-beat="4">5. Now covalent</button>
  <button class="beat-btn" data-beat="5">6. Sharing electrons</button>
  <button class="auto-btn" id="auto-play">▶ Play All</button>
</div>
<script>
let A;
new p5(function(p){
  const cc=document.getElementById('cc');let W,H;
  p.setup=function(){const r=cc.getBoundingClientRect();W=r.width;H=r.height;p.createCanvas(W,H).parent(cc);p.textFont('sans-serif');
    A=new AnimHelper(p,W,H);p._animHelper=A;
    A.init({showAtoms:0,showShells:0,transferProgress:0,ionicFormed:0,showCovalent:0,shareProgress:0,divider:0});
  };
  p.windowResized=function(){const r=cc.getBoundingClientRect();W=r.width;H=r.height;p.resizeCanvas(W,H);A.W=W;A.H=H;};
  p.draw=function(){
    A.tick();A.clear();A.grid(50,5);
    const s=A.state;

    // Divider line (ionic left, covalent right)
    if(s.divider>0.1){
      p.drawingContext.globalAlpha=s.divider;
      A.dashed(W/2,30,W/2,H-10,A.colors.textMuted);
      A.label(W*0.25,28,'IONIC',A.colors.warm,12);
      A.label(W*0.75,28,'COVALENT',A.colors.purple,12);
      p.drawingContext.globalAlpha=1;
    }

    const ionicCx=s.divider>0.1?W*0.25:W*0.5;
    const ionicCy=H*0.5;

    // ── IONIC SIDE: Na + Cl ──
    if(s.showAtoms>0.1){
      const alpha=Math.min(1,s.showAtoms);
      p.drawingContext.globalAlpha=alpha;

      const naX=ionicCx-60+s.ionicFormed*20;
      const clX=ionicCx+60-s.ionicFormed*20;

      // Na nucleus
      A.glow(naX,ionicCy,22,[148,163,184],0.2);
      A.label(naX,ionicCy,'Na',[200,200,220],12);

      // Cl nucleus
      A.glow(clX,ionicCy,26,[148,163,184],0.2);
      A.label(clX,ionicCy,'Cl',[200,200,220],12);

      // Electron shells
      if(s.showShells>0.1){
        p.drawingContext.globalAlpha=alpha*Math.min(1,s.showShells);

        // Na outer electron (1 electron in shell 3)
        p.noFill();p.stroke(251,191,36,120);p.strokeWeight(1);
        p.ellipse(naX,ionicCy,50,50);

        // The transferring electron
        const eAngle=A._t*2;
        const eProgress=s.transferProgress;
        const eStartX=naX+25*Math.cos(eAngle);
        const eStartY=ionicCy+25*Math.sin(eAngle);
        const eEndX=clX+32*Math.cos(eAngle+Math.PI);
        const eEndY=ionicCy+32*Math.sin(eAngle+Math.PI);
        const eX=eStartX+(eEndX-eStartX)*eProgress;
        const eY=eStartY+(eEndY-eStartY)*eProgress;

        A.glow(eX,eY,6,A.colors.warm,0.5);

        // Cl outer shell (7 electrons)
        p.noFill();p.stroke(59,130,246,120);p.strokeWeight(1);
        p.ellipse(clX,ionicCy,65,65);
        for(let i=0;i<7;i++){
          const ea=i/7*Math.PI*2+A._t*0.3;
          A.glow(clX+32*Math.cos(ea),ionicCy+32*Math.sin(ea),4,A.colors.accent,0.3);
        }
        // 8th electron if transferred
        if(s.transferProgress>0.95){
          A.glow(clX+32*Math.cos(eAngle+Math.PI),ionicCy+32*Math.sin(eAngle+Math.PI),4,A.colors.warm,0.5);
        }
      }

      // Ionic bond formed — charges
      if(s.ionicFormed>0.5){
        A.label(naX,ionicCy-30,'Na⁺',A.colors.warm,13);
        A.label(clX,ionicCy-30,'Cl⁻',A.colors.accent,13);

        // Electrostatic attraction lines
        for(let i=0;i<3;i++){
          const ly=ionicCy-8+i*8;
          p.stroke(148,163,184,40);p.strokeWeight(1);
          p.drawingContext.setLineDash([3,5]);
          p.line(naX+15,ly,clX-15,ly);
          p.drawingContext.setLineDash([]);
        }
        A.label(ionicCx,ionicCy+50,'Electrostatic attraction',A.colors.textMuted,10,false);
      }

      p.drawingContext.globalAlpha=1;
    }

    // ── COVALENT SIDE: H + H ──
    if(s.showCovalent>0.1){
      const cx2=W*0.75;
      const cy2=H*0.5;
      const alpha=Math.min(1,s.showCovalent);
      p.drawingContext.globalAlpha=alpha;

      const sep=50-s.shareProgress*20; // atoms approach
      const h1x=cx2-sep;
      const h2x=cx2+sep;

      // H atoms
      A.glow(h1x,cy2,18,[148,163,184],0.2);
      A.label(h1x,cy2,'H',[200,200,220],12);
      A.glow(h2x,cy2,18,[148,163,184],0.2);
      A.label(h2x,cy2,'H',[200,200,220],12);

      // Electron shells
      p.noFill();p.stroke(167,139,250,80);p.strokeWeight(1);
      p.ellipse(h1x,cy2,40,40);
      p.ellipse(h2x,cy2,40,40);

      // Each H has 1 electron
      const e1angle=A._t*1.5;
      const e2angle=A._t*1.5+Math.PI;

      if(s.shareProgress<0.3){
        // Separate electrons
        A.glow(h1x+20*Math.cos(e1angle),cy2+20*Math.sin(e1angle),5,A.colors.purple,0.4);
        A.glow(h2x+20*Math.cos(e2angle),cy2+20*Math.sin(e2angle),5,A.colors.pink,0.4);
      } else {
        // Shared electrons — orbit around BOTH nuclei (figure-8 path)
        const shareAlpha=Math.min(1,(s.shareProgress-0.3)/0.7);
        const mid=(h1x+h2x)/2;
        const orbit1=A._t*2;
        const orbit2=orbit1+Math.PI;

        // Shared orbital region
        p.fill(167,139,250,20*shareAlpha);p.noStroke();
        p.ellipse(mid,cy2,(h2x-h1x)+30,50);

        // Two shared electrons orbiting
        const r1x=mid+(h2x-h1x)*0.35*Math.cos(orbit1);
        const r1y=cy2+18*Math.sin(orbit1);
        const r2x=mid+(h2x-h1x)*0.35*Math.cos(orbit2);
        const r2y=cy2+18*Math.sin(orbit2);
        A.glow(r1x,r1y,5,A.colors.purple,0.5);
        A.glow(r2x,r2y,5,A.colors.pink,0.5);

        A.label(mid,cy2+45,'Shared electron pair',A.colors.purple,10,false);
        if(s.shareProgress>0.8){
          A.label(mid,cy2-40,'H₂ molecule',A.colors.purple,13);
        }
      }
      p.drawingContext.globalAlpha=1;
    }

    // Legend
    const items=[];
    if(s.showShells>0.3){items.push({color:A.colors.warm,label:'Na electron'});items.push({color:A.colors.accent,label:'Cl electrons'});}
    if(s.showCovalent>0.3){items.push({color:A.colors.purple,label:'H electron'});items.push({color:A.colors.pink,label:'H electron'});}
    if(items.length)A.legend(items);
  };
},document.getElementById('cc'));

const beats=[
  {say:"Meet <b>Sodium (Na)</b> and <b>Chlorine (Cl)</b>. Two atoms that want to bond. But how?",fn:()=>{A.animateTo('showAtoms',1);}},
  {say:"Look at their electron shells. Na has <b style='color:#fbbf24'>1 outer electron</b>. Cl has <b style='color:#3b82f6'>7 outer electrons</b> — it wants one more to complete its shell.",fn:()=>{A.animateTo('showShells',1);}},
  {say:"Na <b>gives</b> its electron to Cl. Watch it transfer — Na loses one, Cl gains one. This is an <b>electron transfer</b>.",fn:()=>{A.animateTo('transferProgress',1,1.5);}},
  {say:"Now Na is <b style='color:#fbbf24'>Na⁺</b> (positive) and Cl is <b style='color:#3b82f6'>Cl⁻</b> (negative). Opposite charges attract — that's an <b>ionic bond</b>!",fn:()=>{A.animateTo('ionicFormed',1);A.animateTo('divider',1);}},
  {say:"But what about <b>Hydrogen</b>? Two H atoms each have 1 electron. Neither wants to give theirs up. Different strategy.",fn:()=>{A.animateTo('showCovalent',1);}},
  {say:"Instead of transferring, they <b>share</b>. Both electrons orbit both nuclei — a shared pair. That's a <b style='color:#a78bfa'>covalent bond</b>. H₂ molecule formed!",fn:()=>{A.animateTo('shareProgress',1,1.5);}},
];
initBeatRunner(beats,()=>A);
</script></body></html>
