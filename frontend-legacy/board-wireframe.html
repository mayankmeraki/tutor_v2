<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Engine v2 — Full Visual Primitives</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1117;overflow:hidden;height:100vh;display:flex;flex-direction:column;font-family:-apple-system,sans-serif;color:#e2e8f0}
  #board-wrap{flex:1;position:relative;overflow:auto;background:#111614;-webkit-overflow-scrolling:touch}
  #canvas-board{display:block}
  #anim-layer{position:absolute;top:0;left:0;width:100%;pointer-events:none}
  #anim-layer .anim-box{position:absolute;border:1px solid rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;box-shadow:0 0 12px rgba(0,0,0,0.2);pointer-events:auto}
  #anim-layer .anim-box canvas{display:block}
  #sub{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);max-width:580px;width:88%;background:rgba(13,17,23,0.93);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:10px 20px;text-align:center;font-size:14px;line-height:1.5;backdrop-filter:blur(14px);opacity:0;transition:opacity 0.25s;z-index:50}
  #sub.vis{opacity:1}
  #vbar{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);max-width:440px;width:88%;z-index:55}
  .vb-pill{background:rgba(17,20,19,0.92);border:1px solid rgba(52,211,153,0.13);border-radius:26px;padding:4px 4px 4px 14px;display:flex;align-items:center;gap:5px;backdrop-filter:blur(12px);box-shadow:0 3px 16px rgba(0,0,0,0.3)}
  .vb-pill input{flex:1;background:none;border:none;outline:none;color:#e2e8f0;font-size:13px;padding:7px 0}
  .vb-pill input::placeholder{color:#94a3b8}
  .vb-mic{width:34px;height:34px;border-radius:50%;background:rgba(52,211,153,0.1);border:1.5px solid rgba(52,211,153,0.25);color:#34d399;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  #ctrls{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:4px;background:rgba(13,17,23,0.88);padding:4px 6px;border-radius:8px;border:1px solid rgba(255,255,255,0.05);backdrop-filter:blur(10px)}
  #ctrls button{padding:5px 10px;border-radius:5px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);color:#94a3b8;cursor:pointer;font-size:11px}
  #ctrls button:hover{background:rgba(52,211,153,0.08);color:#e2e8f0}
  #ctrls button.on{background:rgba(52,211,153,0.12);color:#34d399;border-color:rgba(52,211,153,0.25)}
</style>
</head>
<body>

<div id="board-wrap">
  <canvas id="canvas-board"></canvas>
  <div id="anim-layer"></div>
</div>
<div id="sub"></div>
<div id="vbar"><div class="vb-pill"><input placeholder="Type or hold Space to talk..." disabled><div class="vb-mic"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="1" width="6" height="11" rx="3"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div></div></div>

<div id="ctrls">
  <button onclick="runS1()" class="on">Perturbation Theory</button>
  <button onclick="runS2()">Comparison Layout</button>
  <button onclick="runS3()">Full Derivation</button>
  <button onclick="reset()">Reset</button>
</div>

<script>
const V_W = 800, MARGIN = 30, ROW_GAP = 12, SIDE_GAP = 18;
const canvas = document.getElementById('canvas-board');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const wrap = document.getElementById('board-wrap');
const animLayer = document.getElementById('anim-layer');
const subEl = document.getElementById('sub');

let S = 1, dpr = Math.min(window.devicePixelRatio||1, 3), canvasH = 600;
const COLORS = {white:'#e2e8f0',gold:'#fbbf24',green:'#34d399',blue:'#60a5fa',red:'#f87171',cyan:'#53d8fb',pink:'#f472b6',purple:'#a78bfa',dim:'#94a3b8',orange:'#fb923c'};
const SIZES = {h1:28,h2:22,h3:18,text:16,small:14,label:12,caption:10};
const rc = c => COLORS[c]||c||COLORS.white;
const rs = s => (typeof s==='string'?SIZES[s.toLowerCase()]:s)||16;

const L = { cursorY:15, els:{}, inRow:false, rowY:0, rowX:MARGIN, rowH:0 };

// ── Canvas ──────────────────────────────────────────────

function setup() {
  S = wrap.clientWidth / V_W;
  const w = wrap.clientWidth, h = Math.max(canvasH*S, wrap.clientHeight);
  canvas.width = Math.round(w*dpr); canvas.height = Math.round(h*dpr);
  canvas.style.width = w+'px'; canvas.style.height = h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle = '#111614'; ctx.fillRect(0,0,w,h);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=0.5;
  for(let x=40*S;x<w;x+=40*S){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=40*S;y<h;y+=40*S){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
}

function expand(needY) {
  if(needY>canvasH-60){canvasH=needY+200;const w=wrap.clientWidth,h=canvasH*S;
  const old=ctx.getImageData(0,0,canvas.width,canvas.height);
  canvas.height=Math.round(h*dpr);canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);ctx.putImageData(old,0,0);
  ctx.fillStyle='#111614';ctx.fillRect(0,old.height/dpr,w,h-old.height/dpr);
  ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=0.5;
  for(let x=40*S;x<w;x+=40*S){ctx.beginPath();ctx.moveTo(x,old.height/dpr);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=Math.ceil(old.height/dpr/(40*S))*40*S;y<h;y+=40*S){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  animLayer.style.height=h+'px';}
}

function scroll2(y){const p=y*S,vb=wrap.scrollTop+wrap.clientHeight;if(p>vb-40)wrap.scrollTo({top:Math.max(0,p-wrap.clientHeight*.65),behavior:'smooth'});}

// ── Placement ───────────────────────────────────────────

function endRow(){if(L.inRow){L.cursorY=L.rowY+L.rowH+ROW_GAP;L.inRow=false;L.rowX=MARGIN;L.rowH=0;}}

function place(p, w, h) {
  const usable = V_W - MARGIN*2;
  let x, y;
  if(!p||p==='below'){if(L.inRow)endRow();x=MARGIN;y=L.cursorY;}
  else if(p==='center'){if(L.inRow)endRow();x=MARGIN+Math.max(0,(usable-w)/2);y=L.cursorY;}
  else if(p==='right'){if(L.inRow)endRow();x=V_W-MARGIN-w;y=L.cursorY;}
  else if(p==='full-width'){if(L.inRow)endRow();x=MARGIN;y=L.cursorY;w=usable;}
  else if(p==='row-start'){if(L.inRow)endRow();L.inRow=true;L.rowY=L.cursorY;L.rowX=MARGIN;L.rowH=0;x=MARGIN;y=L.cursorY;}
  else if(p==='row-next'){if(!L.inRow){L.inRow=true;L.rowY=L.cursorY;L.rowX=MARGIN;L.rowH=0;}x=L.rowX;y=L.rowY;}
  else if(p.startsWith('beside:')){const r=L.els[p.split(':')[1]];if(r){x=r.x+r.w+SIDE_GAP;y=r.y;}else{x=V_W/2;y=L.cursorY;}}
  else if(p.startsWith('below:')){const r=L.els[p.split(':')[1]];if(r){x=r.x;y=r.y+r.h+6;}else{x=MARGIN;y=L.cursorY;}}
  else if(p==='indent'){if(L.inRow)endRow();x=MARGIN+25;y=L.cursorY;}
  else{x=MARGIN;y=L.cursorY;}
  return {x,y};
}

function commit(id,x,y,w,h){if(id)L.els[id]={x,y,w,h};expand(y+h);
  if(L.inRow){L.rowX=x+w+SIDE_GAP;L.rowH=Math.max(L.rowH,h);}else{L.cursorY=y+h+ROW_GAP;}scroll2(y+h);}

// ── Drawing ─────────────────────────────────────────────

function dText(text,vx,vy,color,size){
  // Instant draw — used by boxes and labels. Returns dimensions.
  const sz=rs(size),bold=(size==='h1'||size==='h2')?'700':'400';
  ctx.font=`${bold} ${sz*S}px Caveat,cursive`;ctx.fillStyle=rc(color);
  ctx.shadowColor=rc(color);ctx.shadowBlur=2;
  ctx.fillText(text,vx*S,(vy+sz*.85)*S);ctx.shadowBlur=0;
  return {w:ctx.measureText(text).width/S+5,h:sz*1.2};
}

async function dTextAnim(text,vx,vy,color,size){
  // Character-by-character chalk writing animation
  const sz=rs(size),bold=(size==='h1'||size==='h2')?'700':'400';
  ctx.font=`${bold} ${sz*S}px Caveat,cursive`;
  ctx.fillStyle=rc(color);ctx.shadowColor=rc(color);ctx.shadowBlur=2;
  ctx.textBaseline='middle';
  let cx=vx*S;
  const charDelay = sz > 20 ? 30 : 20; // faster for body text
  for(let i=0;i<text.length;i++){
    ctx.fillText(text[i],cx,vy*S);
    cx+=ctx.measureText(text[i]).width;
    await new Promise(r=>setTimeout(r,charDelay));
  }
  ctx.shadowBlur=0;ctx.textBaseline='alphabetic';
  return {w:cx/S-vx+5,h:sz*1.2};
}

function dSep(vy,color){ctx.strokeStyle=color||'rgba(255,255,255,0.06)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(60*S,vy*S);ctx.lineTo((V_W-60)*S,vy*S);ctx.stroke();}

function dBox(vx,vy,vw,vh,borderColor,fillColor){
  ctx.fillStyle=fillColor||'rgba(255,255,255,0.02)';
  const r=5*S;
  ctx.beginPath();ctx.roundRect(vx*S,vy*S,vw*S,vh*S,r);ctx.fill();
  if(borderColor){ctx.strokeStyle=borderColor;ctx.lineWidth=1.5*S;ctx.stroke();}
}

function dArrow(x1,y1,x2,y2,color){
  const s=S;ctx.strokeStyle=rc(color);ctx.lineWidth=1.5*s;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1*s,y1*s);ctx.lineTo(x2*s,y2*s);ctx.stroke();
  const angle=Math.atan2(y2-y1,x2-x1),hl=8*s;
  ctx.beginPath();ctx.moveTo(x2*s,y2*s);
  ctx.lineTo((x2-hl/s*Math.cos(angle-.4))*s,(y2-hl/s*Math.sin(angle-.4))*s);
  ctx.moveTo(x2*s,y2*s);
  ctx.lineTo((x2-hl/s*Math.cos(angle+.4))*s,(y2-hl/s*Math.sin(angle+.4))*s);
  ctx.stroke();
}

function dStepNum(n,vx,vy,color){
  const r=11*S;ctx.fillStyle=rc(color);ctx.globalAlpha=0.15;
  ctx.beginPath();ctx.arc(vx*S,vy*S,r,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.strokeStyle=rc(color);ctx.lineWidth=1.5*S;
  ctx.beginPath();ctx.arc(vx*S,vy*S,r,0,Math.PI*2);ctx.stroke();
  ctx.font=`700 ${13*S}px Caveat,cursive`;ctx.fillStyle=rc(color);ctx.textAlign='center';
  ctx.fillText(n,vx*S,(vy+5)*S);ctx.textAlign='start';
}

function dCheckmark(vx,vy,color){
  ctx.strokeStyle=rc(color||'green');ctx.lineWidth=2.5*S;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(vx*S,(vy+5)*S);ctx.lineTo((vx+4)*S,(vy+10)*S);ctx.lineTo((vx+12)*S,vy*S);ctx.stroke();
}

function dCross(vx,vy,color){
  ctx.strokeStyle=rc(color||'red');ctx.lineWidth=2.5*S;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(vx*S,vy*S);ctx.lineTo((vx+10)*S,(vy+10)*S);ctx.stroke();
  ctx.beginPath();ctx.moveTo((vx+10)*S,vy*S);ctx.lineTo(vx*S,(vy+10)*S);ctx.stroke();
}

// ── Command Executor ────────────────────────────────────

async function exec(cmd) {
  const p = cmd.placement||'below';
  const sz = rs(cmd.size);
  let estW=cmd.w||300, estH=cmd.h||sz*1.2;
  if(cmd.cmd==='text'){ctx.font=`400 ${sz*S}px Caveat,cursive`;estW=ctx.measureText(cmd.text||'').width/S+10;estH=sz*1.2;}
  if(cmd.cmd==='box')estH=cmd.h||60;
  if(cmd.cmd==='separator'){estW=V_W-MARGIN*2;estH=8;}

  const {x,y}=place(p,estW,estH);
  let aw=estW,ah=estH;

  switch(cmd.cmd){
    case'text':{const m=await dTextAnim(cmd.text,x,y,cmd.color,cmd.size);aw=m.w;ah=m.h;break;}
    case'separator':{dSep(y+4,cmd.color);aw=V_W-MARGIN*2;ah=10;break;}
    case'box':{
      const bw=cmd.w||(V_W-MARGIN*2);const bh=cmd.h||60;
      dBox(x,y,bw,bh,cmd.borderColor,cmd.fillColor);
      // Draw text inside box
      if(cmd.text){dText(cmd.text,x+12,y+8,cmd.color,cmd.size||'text');}
      if(cmd.label){ctx.font=`700 ${10*S}px -apple-system,sans-serif`;ctx.fillStyle=rc(cmd.labelColor||'dim');
        ctx.fillText(cmd.label.toUpperCase(),(x+12)*S,(y-3)*S);}
      aw=bw;ah=bh;break;}
    case'arrow':{dArrow(cmd.x1||x,cmd.y1||y,cmd.x2||(x+100),cmd.y2||(y+30),cmd.color);aw=20;ah=20;break;}
    case'step':{dStepNum(cmd.n,x+11,y+11,cmd.color||'gold');if(cmd.text){dText(cmd.text,x+28,y,cmd.color||'white',cmd.size||'text');}aw=300;ah=rs(cmd.size||'text')*1.2;break;}
    case'check':{dCheckmark(x,y+2,cmd.color);if(cmd.text){dText(cmd.text,x+18,y,cmd.textColor||'white',cmd.size||'small');}aw=200;ah=16;break;}
    case'cross':{dCross(x,y+2,cmd.color);if(cmd.text){dText(cmd.text,x+18,y,cmd.textColor||'dim',cmd.size||'small');}aw=200;ah=16;break;}
    case'animation':{aw=cmd.w||350;ah=cmd.h||160;
      const c=document.createElement('div');c.className='anim-box';
      c.style.left=(x*S)+'px';c.style.top=(y*S)+'px';c.style.width=Math.round(aw*S)+'px';c.style.height=Math.round(ah*S)+'px';
      animLayer.appendChild(c);if(cmd.launch)setTimeout(()=>cmd.launch(c,Math.round(aw*S),Math.round(ah*S)),50);break;}
    case'spacer':{aw=1;ah=cmd.h||20;break;}
  }
  commit(cmd.id,x,y,aw,ah);
}

// ── Beat System ─────────────────────────────────────────
let bQ=[],bR=false;
function addB(b){bQ.push(b);if(!bR)drain();}
async function drain(){bR=true;while(bQ.length)await xB(bQ.shift());bR=false;}
async function xB(b){
  if(b.say){subEl.textContent=b.say;subEl.classList.add('vis');}
  if(b.cmds)for(const c of b.cmds)await exec(c);
  if(b.ref){const el=L.els[b.ref];if(el){
    const s=S,d=dpr,pad=3*s,ex=el.x*s-pad,ey=el.y*s-pad,ew=el.w*s+pad*2,eh=el.h*s+pad*2;
    const cx=Math.round(ex*d),cy=Math.round(ey*d),cw=Math.min(Math.round(ew*d),canvas.width-cx),ch=Math.min(Math.round(eh*d),canvas.height-cy);
    if(cw>0&&ch>0){try{const id=ctx.getImageData(cx,cy,cw,ch);const t=document.createElement('canvas');t.width=cw;t.height=ch;
    t.getContext('2d').putImageData(id,0,0);const cl=document.createElement('div');
    cl.style.cssText=`position:absolute;left:${ex}px;top:${ey}px;width:${ew}px;height:${eh}px;pointer-events:none;z-index:25;transform:scale(1);transform-origin:center;opacity:0;transition:transform .4s cubic-bezier(.25,.1,.25,1),opacity .3s;border-radius:3px`;
    const im=document.createElement('img');im.src=t.toDataURL();im.style.cssText='width:100%;height:100%;display:block;border-radius:3px';
    cl.appendChild(im);animLayer.appendChild(cl);
    requestAnimationFrame(()=>{cl.style.opacity='1';cl.style.transform='scale(1.18)';});
    setTimeout(()=>{cl.style.transition='transform .5s ease,opacity .5s ease';cl.style.transform='scale(1)';cl.style.opacity='0';setTimeout(()=>cl.remove(),550);},1400);
    scroll2(el.y+el.h);}catch(e){}}}}
  const dur=b.pause!==undefined?b.pause:(b.say?Math.max(.7,b.say.length*.025):.3);
  await new Promise(r=>setTimeout(r,dur*1000));
  if(b.say&&!b.question){subEl.classList.remove('vis');await new Promise(r=>setTimeout(r,100));}
}

// ── Animations ──────────────────────────────────────────

function launchPerturbedOsc(c,w,h){
  new p5(p=>{let t=0;p.setup=()=>{p.createCanvas(w,h);p.textFont('Caveat');};p.draw=()=>{
    p.background(15,20,16);t+=.03;const cx=w/2;
    // Original parabola
    p.stroke(96,165,250,60);p.strokeWeight(1);p.noFill();p.beginShape();
    for(let x=0;x<w;x+=2){const v=((x-cx)/(w*.35))**2*h*.3+h*.55;p.vertex(x,Math.min(v,h*.9));}p.endShape();
    // Tilted parabola (perturbed)
    p.stroke(248,113,113,120);p.strokeWeight(1.5);p.beginShape();
    const tilt=Math.sin(t*.5)*w*.08;
    for(let x=0;x<w;x+=2){const v=((x-cx-tilt)/(w*.35))**2*h*.3+h*.55-(x-cx)*0.03;p.vertex(x,Math.min(v,h*.9));}p.endShape();
    // Energy levels
    for(let n=0;n<4;n++){const ey=h*.82-n*h*.065;
    p.stroke(251,191,36,50+n*25);p.strokeWeight(1);p.line(w*.28,ey,w*.72,ey);
    p.noFill();p.stroke(52,211,153,70+n*30);p.strokeWeight(1.5);p.beginShape();
    for(let x=w*.28;x<w*.72;x+=2){const L2=w*.44;const xi=x-w*.28;p.vertex(x,ey-Math.sin((n+1)*Math.PI*xi/L2)*Math.cos(t*2+n)*8);}p.endShape();}
    p.noStroke();p.fill(96,165,250,70);p.textSize(Math.max(9,w*.018));p.text('V₀(x)',w*.08,h*.48);
    p.fill(248,113,113,100);p.text('V₀ + λV',w*.08,h*.55);
  };},c);
}

function launchEnergyCompare(c,w,h){
  new p5(p=>{let t=0;p.setup=()=>{p.createCanvas(w,h);p.textFont('Caveat');};p.draw=()=>{
    p.background(15,20,16);t+=.02;
    const midX=w/2;
    // Left: harmonic oscillator (equal spacing)
    p.fill(255,255,255,30);p.textSize(Math.max(9,w*.02));p.textAlign(p.CENTER);
    p.text('Harmonic Oscillator',w*.25,16);
    for(let n=0;n<5;n++){const y=h*.85-n*h*.12;
    p.stroke(52,211,153,80);p.strokeWeight(1);p.line(w*.08,y,w*.42,y);
    p.noStroke();p.fill(52,211,153,100);p.textAlign(p.LEFT);p.textSize(Math.max(8,w*.015));p.text(`E${n}`,w*.43,y+4);}
    // Right: particle in box (quadratic spacing)
    p.fill(255,255,255,30);p.textSize(Math.max(9,w*.02));p.textAlign(p.CENTER);
    p.text('Particle in Box',w*.75,16);
    for(let n=1;n<=5;n++){const y=h*.85-n*n*h*.028;
    p.stroke(251,191,36,80);p.strokeWeight(1);p.line(w*.58,y,w*.92,y);
    p.noStroke();p.fill(251,191,36,100);p.textAlign(p.LEFT);p.textSize(Math.max(8,w*.015));p.text(`E${n}`,w*.93,y+4);}
    p.textAlign(p.LEFT);
    // Labels
    p.fill(52,211,153,60);p.textSize(Math.max(8,w*.015));p.text('Equal spacing',w*.1,h-8);
    p.fill(251,191,36,60);p.text('E ∝ n²',w*.65,h-8);
  };},c);
}

// ── SCENE 1: Perturbation Theory (rich visuals) ─────────

function runS1(){
  reset();document.querySelectorAll('#ctrls button')[0].classList.add('on');

  addB({cmds:[{cmd:'text',text:'Perturbation Theory',placement:'center',size:'h1',color:'gold',id:'title'}],
    say:"Let me walk you through perturbation theory — one of the most powerful tools in quantum mechanics."});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  // Key idea box
  addB({cmds:[{cmd:'box',placement:'center',w:500,h:45,borderColor:'rgba(52,211,153,0.3)',fillColor:'rgba(52,211,153,0.04)',
    text:'Core idea: Start with something you CAN solve, then add a small correction.',color:'green',label:'Key Insight',labelColor:'green',id:'key-box'}],
    say:"The core idea is simple. Start with something you can solve exactly, then treat the hard part as a small correction."});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  // Step 1
  addB({cmds:[{cmd:'step',n:'1',text:'Start with the solved system',color:'gold',placement:'below',id:'step1'}],
    say:"Step one. Start with a Hamiltonian you already know."});

  addB({cmds:[{cmd:'text',text:'Ĥ₀|n⁰⟩ = Eₙ⁰|n⁰⟩',placement:'indent',size:'text',color:'cyan',id:'solved-eq'}],
    say:"H-zero acting on the unperturbed states gives you the known energies."});

  addB({cmds:[{cmd:'check',text:'Eigenvalues known',placement:'indent',color:'green',textColor:'dim'}],pause:.3});
  addB({cmds:[{cmd:'check',text:'Eigenstates known',placement:'indent',color:'green',textColor:'dim'}],pause:.3});

  // Step 2
  addB({cmds:[{cmd:'step',n:'2',text:'Add a small perturbation',color:'gold',placement:'below',id:'step2'}],
    say:"Step two. Add the perturbation."});

  addB({cmds:[{cmd:'text',text:'Ĥ = Ĥ₀ + λV',placement:'indent',size:'text',color:'green',id:'full-ham'}],
    say:"The full Hamiltonian is the solved part plus lambda times V."});

  addB({cmds:[{cmd:'text',text:'λ ≪ 1  (coupling is weak)',placement:'beside:full-ham',size:'small',color:'dim'}],pause:.3});

  // Step 3
  addB({cmds:[{cmd:'step',n:'3',text:'Expand in powers of λ',color:'gold',placement:'below',id:'step3'}],
    say:"Step three. Expand everything as a power series in lambda."});

  // Two expansions side by side
  addB({cmds:[
    {cmd:'text',text:'|n⟩ = |n⁰⟩ + λ|n¹⟩ + λ²|n²⟩ + ...',placement:'row-start',size:'text',color:'cyan',id:'state-exp'},
  ],say:"The state gets corrections at each order."});

  addB({cmds:[
    {cmd:'text',text:'Eₙ = Eₙ⁰ + λEₙ¹ + λ²Eₙ² + ...',placement:'row-next',size:'text',color:'gold',id:'energy-exp'},
  ],say:"Same for the energy."});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  // Example with animation
  addB({cmds:[{cmd:'text',text:'Example: Harmonic Oscillator in Electric Field',placement:'center',size:'h2',color:'gold'}],
    say:"Let me show you a concrete example."});

  addB({cmds:[
    {cmd:'animation',placement:'row-start',w:320,h:160,id:'pot-anim',launch:launchPerturbedOsc},
  ],say:"Watch the animation."});

  addB({cmds:[
    {cmd:'text',text:'Blue: original V₀ = ½mω²x²',placement:'row-next',size:'small',color:'blue',id:'al1'},
  ],say:"Blue is the original parabola."});

  addB({cmds:[
    {cmd:'text',text:'Red: perturbed V₀ + qεx',placement:'below:al1',size:'small',color:'red',id:'al2'},
  ],say:"Red shows the electric field tilting it."});

  addB({cmds:[
    {cmd:'text',text:'Green: wavefunctions shift',placement:'below:al2',size:'small',color:'green'},
  ],pause:.3});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  // Result box
  addB({cmds:[{cmd:'box',placement:'center',w:520,h:50,borderColor:'rgba(251,191,36,0.3)',fillColor:'rgba(251,191,36,0.04)',
    text:'First-order energy: Eₙ¹ = ⟨n⁰|V|n⁰⟩ = 0  (by symmetry!)',color:'gold',label:'Result',labelColor:'gold',id:'result-box'}],
    say:"And the first-order energy correction is exactly zero — by symmetry."});

  addB({say:"The expectation value of x vanishes in any eigenstate. {ref:result-box}",ref:'result-box'});

  addB({cmds:[{cmd:'text',text:'For the ground state, which states mix in at first order?',placement:'below',size:'text',color:'gold'}],
    say:"Which states get mixed into the ground state correction?",question:true,pause:0});
}

// ── SCENE 2: Comparison Layout ──────────────────────────

function runS2(){
  reset();document.querySelectorAll('#ctrls button')[1].classList.add('on');

  addB({cmds:[{cmd:'text',text:'Energy Level Comparison',placement:'center',size:'h1',color:'gold',id:'t2'}],
    say:"Let me compare two quantum systems side by side."});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  // Full-width animation comparing two systems
  addB({cmds:[{cmd:'animation',placement:'full-width',w:V_W-MARGIN*2,h:200,id:'compare-anim',launch:launchEnergyCompare}],
    say:"On the left, the harmonic oscillator — equally spaced levels. On the right, particle in a box — levels that spread apart."});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  // Comparison via side-by-side boxes
  addB({cmds:[
    {cmd:'box',placement:'row-start',w:340,h:95,borderColor:'rgba(52,211,153,0.25)',fillColor:'rgba(52,211,153,0.03)',
      text:'Eₙ = (n + ½)ℏω\nEqual spacing: ΔE = ℏω\nInfinite levels',color:'green',label:'Harmonic Oscillator',labelColor:'green',id:'ho-box'},
  ],say:"The harmonic oscillator has equally spaced energy levels."});

  addB({cmds:[
    {cmd:'box',placement:'row-next',w:340,h:95,borderColor:'rgba(251,191,36,0.25)',fillColor:'rgba(251,191,36,0.03)',
      text:'Eₙ = n²π²ℏ²/2mL²\nGrowing spacing: ΔE ∝ n\nInfinite levels',color:'gold',label:'Particle in Box',labelColor:'gold',id:'box-box'},
  ],say:"The particle in a box has levels that spread apart — energy grows as n squared."});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  addB({cmds:[{cmd:'text',text:'Key Differences:',placement:'below',size:'h2',color:'green'}],pause:.2});

  // Checklist comparison
  addB({cmds:[{cmd:'text',text:'Ground state:',placement:'row-start',size:'small',color:'dim'},
    {cmd:'text',text:'E₀ = ½ℏω ≠ 0',placement:'row-next',size:'small',color:'green'},
    {cmd:'text',text:'E₁ = π²ℏ²/2mL² ≠ 0',placement:'row-next',size:'small',color:'gold'},
  ],say:"Both have nonzero ground state energy — zero-point energy from the uncertainty principle."});

  addB({cmds:[{cmd:'text',text:'Spacing:',placement:'row-start',size:'small',color:'dim'},
    {cmd:'text',text:'constant (ℏω)',placement:'row-next',size:'small',color:'green'},
    {cmd:'text',text:'grows with n',placement:'row-next',size:'small',color:'gold'},
  ],pause:.3});

  addB({cmds:[{cmd:'text',text:'Potential:',placement:'row-start',size:'small',color:'dim'},
    {cmd:'text',text:'V = ½kx² (smooth)',placement:'row-next',size:'small',color:'green'},
    {cmd:'text',text:'V = 0 inside, ∞ walls',placement:'row-next',size:'small',color:'gold'},
  ],pause:.3});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  // Key insight box
  addB({cmds:[{cmd:'box',placement:'center',w:520,h:50,borderColor:'rgba(167,139,250,0.3)',fillColor:'rgba(167,139,250,0.04)',
    text:'Both have E₀ > 0 — a particle can never have zero energy (Heisenberg!)',color:'purple',label:'Why?',labelColor:'purple',id:'insight'}],
    say:"This is the uncertainty principle in action. Confine a particle and it must have kinetic energy."});

  addB({say:"This is true for both systems. {ref:ho-box} {ref:box-box}",ref:'ho-box'});

  addB({cmds:[{cmd:'text',text:'Which system has higher ground state energy for the same size?',placement:'below',size:'text',color:'gold'}],
    say:"Which system has higher ground state energy — if both have the same characteristic size?",question:true,pause:0});
}

// ── SCENE 3: Full Derivation with Steps ─────────────────

function runS3(){
  reset();document.querySelectorAll('#ctrls button')[2].classList.add('on');

  addB({cmds:[{cmd:'text',text:'Solving the Infinite Square Well',placement:'center',size:'h1',color:'gold',id:'t3'}],
    say:"Let me walk you through solving the particle in a box from scratch."});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  addB({cmds:[{cmd:'step',n:'1',text:'Write the Schrödinger equation inside the box',color:'gold',placement:'below'}],
    say:"Step one. Inside the box, potential is zero."});

  addB({cmds:[{cmd:'text',text:'-ℏ²/2m · d²ψ/dx² = Eψ',placement:'center',size:'text',color:'cyan',id:'se'}],
    say:"This is just a second-order ODE."});

  addB({cmds:[{cmd:'text',text:'Define k² = 2mE/ℏ²    →    d²ψ/dx² = -k²ψ',placement:'center',size:'small',color:'dim',id:'define-k'}],
    say:"Define k-squared. Now it's the simplest differential equation."});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  addB({cmds:[{cmd:'step',n:'2',text:'General solution',color:'gold',placement:'below'}],
    say:"Step two. The general solution."});

  addB({cmds:[{cmd:'text',text:'ψ(x) = A sin(kx) + B cos(kx)',placement:'center',size:'text',color:'green',id:'general'}],
    say:"Sine and cosine — the most general solution."});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  addB({cmds:[{cmd:'step',n:'3',text:'Apply boundary conditions',color:'gold',placement:'below'}],
    say:"Step three. Apply the boundary conditions — this is where quantization happens."});

  // Boundary conditions with checks/crosses
  addB({cmds:[{cmd:'text',text:'ψ(0) = 0:',placement:'row-start',size:'text',color:'cyan'},
    {cmd:'text',text:'A·0 + B·1 = 0  →  B = 0',placement:'row-next',size:'text',color:'white'},
    {cmd:'check',text:'cosine eliminated!',placement:'row-next',color:'green',textColor:'green'},
  ],say:"At x equals zero, psi must vanish. Sine of zero is zero — good. Cosine of zero is one — must set B to zero."});

  addB({cmds:[{cmd:'text',text:'ψ(L) = 0:',placement:'row-start',size:'text',color:'cyan'},
    {cmd:'text',text:'A sin(kL) = 0  →  kL = nπ',placement:'row-next',size:'text',color:'white'},
  ],say:"At x equals L, sine of k-L must be zero. That means k-L is n-pi."});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  addB({cmds:[{cmd:'step',n:'4',text:'Extract the quantized energies',color:'gold',placement:'below'}],
    say:"Step four. The punchline — quantized energy."});

  // Key result in a box
  addB({cmds:[{cmd:'box',placement:'center',w:480,h:55,borderColor:'rgba(251,191,36,0.35)',fillColor:'rgba(251,191,36,0.05)',
    text:'Eₙ = n²π²ℏ² / 2mL²     (n = 1, 2, 3, ...)',color:'gold',label:'Quantized Energy',labelColor:'gold',id:'energy-result'}],
    say:"Energy is quantized — it goes as n-squared. Only specific energies are allowed."});

  addB({cmds:[{cmd:'box',placement:'center',w:480,h:40,borderColor:'rgba(52,211,153,0.25)',fillColor:'rgba(52,211,153,0.03)',
    text:'ψₙ(x) = √(2/L) · sin(nπx/L)',color:'green',label:'Wavefunctions',labelColor:'green',id:'wfn-result'}],
    say:"And the wavefunctions are sine waves — perfectly fitting inside the box."});

  addB({cmds:[{cmd:'separator'}],pause:.2});

  // Key observations
  addB({cmds:[{cmd:'text',text:'Key observations:',placement:'below',size:'h2',color:'green'}],pause:.2});

  addB({cmds:[{cmd:'check',text:'E₁ > 0 — zero-point energy (uncertainty principle)',placement:'below',color:'green',textColor:'white'}],
    say:"The ground state energy is not zero. The particle always has some kinetic energy."});
  addB({cmds:[{cmd:'check',text:'Eₙ ∝ n² — energy grows quadratically',placement:'below',color:'green',textColor:'white'}],pause:.3});
  addB({cmds:[{cmd:'check',text:'Eₙ ∝ 1/L² — smaller box = higher energy',placement:'below',color:'green',textColor:'white'}],
    say:"And notice — smaller box means higher energy. Squeeze a particle and it fights back."});
  addB({cmds:[{cmd:'cross',text:'n = 0 forbidden — particle must exist!',placement:'below',color:'red',textColor:'dim'}],
    say:"And n equals zero is forbidden. The particle must be somewhere."});

  addB({say:"Look at the energy formula. {ref:energy-result} If you halve L, energy quadruples!",ref:'energy-result'});

  addB({cmds:[{cmd:'text',text:'If L shrinks by half, by how much does E₁ change?',placement:'below',size:'text',color:'gold'}],
    say:"If the box shrinks to half its size, what happens to the ground state energy?",question:true,pause:0});
}

function reset(){L.cursorY=15;L.els={};L.inRow=false;L.rowX=MARGIN;L.rowH=0;canvasH=600;
  animLayer.innerHTML='';subEl.classList.remove('vis');bQ=[];bR=false;
  document.querySelectorAll('#ctrls button').forEach(b=>b.classList.remove('on'));setup();}

window.addEventListener('resize',()=>{if(!bR)setup();});
setup();setTimeout(runS1,300);
</script>
