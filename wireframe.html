<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Euler — Board-First Teaching</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg-surface: #1a1d27;
    --bg-elevated: #222636;
    --border: #2a2e3d;
    --border-active: #4a4f6a;
    --accent: #6366f1;
    --accent-bright: #818cf8;
    --text: #e2e4eb;
    --text-muted: #a0a3b1;
    --text-dim: #5f6274;
    --chalk-white: #d4dbd4;
    --chalk-yellow: #e8d47a;
    --chalk-cyan: #7eb8da;
    --chalk-green: #7ed99a;
    --chalk-red: #e88a7a;
    --chalk-dim: #5a6055;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --font-board: 'Caveat', cursive;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; border-bottom: 1px solid var(--border);
    background: var(--bg-surface); height: 42px; flex-shrink: 0;
  }
  header .left { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-muted); }
  header .left .back { cursor: pointer; opacity: 0.6; }
  header .left .back:hover { opacity: 1; }
  header .right { display: flex; align-items: center; gap: 14px; font-size: 12px; }
  .timer { font-family: var(--font-mono); color: var(--text-muted); }
  .cost { font-family: var(--font-mono); color: var(--text-dim); font-size: 11px; }

  /* ── Main layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Board area ── */
  .board-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .board-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 24px; border-bottom: 1px solid rgba(255,255,255,0.04);
    background: rgba(0,0,0,0.15); flex-shrink: 0; min-height: 36px;
  }
  .board-header-left { display: flex; align-items: center; gap: 10px; }
  .board-badge {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
    background: rgba(108,140,255,0.12); color: var(--accent-bright);
    padding: 3px 10px; border-radius: 4px; font-weight: 700;
  }
  .board-title-text {
    font-family: var(--font-board); font-size: 22px; color: var(--chalk-white);
  }
  .board-status {
    font-size: 11px; color: var(--accent-bright);
    display: flex; align-items: center; gap: 6px;
  }
  .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent-bright);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  /* ── Canvas (blackboard) ── */
  .canvas-wrap {
    flex: 1; position: relative; overflow: auto;
    background: var(--bg-surface);
    box-shadow: inset 0 0 120px rgba(0,0,0,0.4);
  }
  #board {
    display: block; width: 100%; min-height: 100%;
  }

  /* ── Voice bubble ── */
  .voice-bubble {
    position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(10,12,20,0.85); backdrop-filter: blur(10px);
    border: 1px solid rgba(99,102,241,0.25); border-radius: 24px;
    padding: 10px 22px; font-size: 14px; color: var(--chalk-white);
    font-family: var(--font); max-width: 75%; text-align: center;
    transition: opacity 0.4s, transform 0.3s;
    pointer-events: none;
  }
  .voice-bubble.hidden { opacity: 0; transform: translateX(-50%) translateY(8px); }
  .voice-bubble .icon { color: var(--accent-bright); margin-right: 8px; font-size: 12px; }

  /* Tutor writing indicator */
  .writing-indicator {
    position: absolute; bottom: 70px; right: 24px;
    font-size: 12px; color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
    opacity: 0; transition: opacity 0.3s;
  }
  .writing-indicator.visible { opacity: 1; }
  .writing-indicator .dots span {
    display: inline-block; width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent-bright); margin: 0 1px;
    animation: dotPulse 1.2s infinite;
  }
  .writing-indicator .dots span:nth-child(2) { animation-delay: 0.2s; }
  .writing-indicator .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%,100% { opacity:0.2; } 50% { opacity:1; } }

  /* ── Student drawing tools ── */
  .draw-tools {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 3px; background: rgba(15,17,23,0.9); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: 10px; padding: 4px;
  }
  .draw-tools button {
    width: 30px; height: 30px; border-radius: 7px; border: none;
    cursor: pointer; font-size: 13px; display: flex; align-items: center;
    justify-content: center; background: transparent; color: var(--text-dim);
    transition: all 0.15s;
  }
  .draw-tools button:hover { background: rgba(255,255,255,0.06); }
  .draw-tools button.active { background: var(--accent); color: #fff; }
  .color-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid transparent; }
  .draw-tools button.active .color-dot { border-color: rgba(255,255,255,0.8); }

  /* ── Resource pane ── */
  .resource-pane {
    width: 320px; border-left: 1px solid var(--border);
    background: var(--bg); display: none; flex-direction: column; flex-shrink: 0;
  }
  .resource-pane.open { display: flex; }
  .resource-pane-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim); font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .resource-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; line-height: 1; }
  .resource-close:hover { color: var(--text); }

  .resource-list { flex: 1; overflow-y: auto; padding: 8px; }

  .resource-item {
    border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 8px; overflow: hidden; transition: all 0.3s;
    background: var(--bg-surface);
  }
  .resource-item.active-highlight {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(99,102,241,0.25), 0 0 4px rgba(99,102,241,0.15);
  }
  @keyframes resourceGlow {
    0%,100% { box-shadow: 0 0 8px rgba(99,102,241,0.2); }
    50% { box-shadow: 0 0 20px rgba(99,102,241,0.5), 0 0 6px rgba(99,102,241,0.3); }
  }
  .resource-item.flash {
    animation: resourceGlow 1s ease-in-out 3;
    border-color: var(--accent-bright);
  }
  .resource-item .thumb {
    width: 100%; aspect-ratio: 16/9; background: #000;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 28px; cursor: pointer;
    position: relative;
  }
  .resource-item .thumb:hover { color: var(--accent-bright); }
  .resource-item .thumb .board-label {
    position: absolute; top: 6px; left: 8px; font-size: 9px;
    background: rgba(0,0,0,0.6); color: var(--text-dim); padding: 2px 6px;
    border-radius: 3px; font-family: var(--font);
  }
  .resource-item .info {
    padding: 10px 12px; font-size: 12px; color: var(--text-dim); line-height: 1.5;
  }
  .resource-item .info strong { color: var(--text-muted); display: block; margin-bottom: 2px; }
  .resource-item .info .time { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }

  /* ── Bottom bar ── */
  .bottom-bar {
    border-top: 1px solid var(--border); background: var(--bg-surface); flex-shrink: 0;
  }
  .transcript-bar {
    padding: 6px 20px; font-size: 13px; color: var(--text-dim);
    border-bottom: 1px solid rgba(255,255,255,0.03); min-height: 30px;
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font); line-height: 1.4;
  }
  .transcript-bar .who {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; flex-shrink: 0; padding: 2px 8px;
    border-radius: 4px;
  }
  .transcript-bar .who.tutor { color: var(--accent-bright); background: rgba(99,102,241,0.1); }
  .transcript-bar .who.student { color: var(--chalk-green); background: rgba(126,217,154,0.1); }

  .input-row {
    display: flex; align-items: center; padding: 8px 14px; gap: 6px;
  }
  .input-row input {
    flex: 1; background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13px;
    outline: none; font-family: var(--font);
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text-dim); }
  .ibtn {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    flex-shrink: 0; transition: all 0.15s;
  }
  .ibtn:hover { border-color: var(--accent); color: var(--text); }
  .ibtn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ibtn.primary:hover { background: var(--accent-bright); }

  /* ── Board thumbnails ── */
  .board-nav {
    display: flex; align-items: center; gap: 6px; padding: 6px 14px;
    border-top: 1px solid var(--border); background: rgba(0,0,0,0.2);
    overflow-x: auto; flex-shrink: 0;
  }
  .board-thumb {
    flex-shrink: 0; width: 90px; height: 54px; border-radius: 5px;
    border: 2px solid var(--border); background: var(--bg-surface);
    cursor: pointer; position: relative; overflow: hidden; transition: all 0.2s;
  }
  .board-thumb:hover { border-color: var(--border-active); }
  .board-thumb.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .board-thumb.viewing { border-color: var(--chalk-yellow); }
  .board-thumb canvas { width: 100%; height: 100%; pointer-events: none; }
  .board-thumb .label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.8); padding: 1px 5px;
    font-size: 8px; color: var(--text-dim); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Review banner ── */
  .review-banner {
    display: none; align-items: center; justify-content: center; gap: 10px;
    padding: 6px; background: rgba(232,212,122,0.06);
    border-bottom: 1px solid rgba(232,212,122,0.15);
    font-size: 12px; color: var(--chalk-yellow); flex-shrink: 0;
  }
  .review-banner.visible { display: flex; }
  .review-banner button {
    padding: 3px 12px; border-radius: 5px; border: 1px solid var(--chalk-yellow);
    background: transparent; color: var(--chalk-yellow); cursor: pointer; font-size: 11px;
  }

  /* ── Assessment modal ── */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.open { display: flex; }
  .assess-modal {
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 32px; max-width: 500px; width: 92%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .assess-modal .header { font-size: 11px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 16px; }
  .assess-modal .q { font-size: 15px; color: var(--text); line-height: 1.6; margin-bottom: 20px; }
  .assess-modal .q em { color: var(--chalk-cyan); font-style: normal; }
  .opt {
    display: flex; align-items: center; gap: 12px; padding: 11px 14px;
    border: 1px solid var(--border); border-radius: 9px; cursor: pointer;
    font-size: 14px; color: var(--text-muted); transition: all 0.15s; margin-bottom: 6px;
  }
  .opt:hover { border-color: var(--border-active); color: var(--text); }
  .opt.sel { border-color: var(--accent); background: rgba(99,102,241,0.08); color: var(--text); }
  .opt .r { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border-active); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .opt.sel .r { border-color: var(--accent); }
  .opt.sel .r::after { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .assess-modal .foot { display: flex; justify-content: flex-end; margin-top: 20px; }
  .sbtn { padding: 9px 24px; border-radius: 8px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-size: 13px; font-weight: 500; }
  .sbtn:hover { background: var(--accent-bright); }
  .sbtn:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="left">
    <span class="back">← Setup</span>
    <span style="color:var(--text)">MIT 8.04 Quantum Physics I, 2013</span>
  </div>
  <div class="right">
    <span class="timer" id="timer">0:00</span>
    <span class="cost" id="cost">$0.00</span>
  </div>
</header>

<div class="main">
  <div class="board-area">
    <div class="board-header">
      <div class="board-header-left">
        <div class="board-badge" id="board-badge">BOARD</div>
        <div class="board-title-text" id="board-title">The Uncertainty Principle</div>
      </div>
      <div class="board-status" id="board-status"><div class="pulse-dot"></div> Euler is teaching</div>
    </div>
    <div class="review-banner" id="review-banner"></div>
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="board"></canvas>
      <div class="voice-bubble hidden" id="voice-bubble"><span class="icon">◉</span> <span id="voice-text"></span></div>
      <div class="writing-indicator" id="writing-ind">✍ Euler is writing <div class="dots"><span></span><span></span><span></span></div></div>
      <div class="draw-tools">
        <button class="active" onclick="pickTool(this)"><div class="color-dot" style="background:var(--chalk-green)"></div></button>
        <button onclick="pickTool(this)"><div class="color-dot" style="background:var(--chalk-red)"></div></button>
        <button onclick="pickTool(this)"><div class="color-dot" style="background:var(--chalk-white)"></div></button>
        <button onclick="pickTool(this)">⌫</button>
      </div>
    </div>
  </div>

  <div class="resource-pane" id="res-pane">
    <div class="resource-pane-header">
      Resources
      <button class="resource-close" onclick="toggleResPane()">×</button>
    </div>
    <div class="resource-list" id="res-list"></div>
  </div>
</div>

<div class="bottom-bar">
  <div class="transcript-bar" id="transcript">
    <span class="who tutor" id="tr-who">Euler</span>
    <span id="tr-text">Ready to begin...</span>
  </div>
  <div class="input-row">
    <input type="text" id="user-input" placeholder="Type your response..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="ibtn" title="Voice">🎤</button>
    <button class="ibtn primary" onclick="sendMsg()" title="Send">➤</button>
  </div>
</div>

<div class="board-nav" id="board-nav"></div>

<div class="modal-bg" id="assess-bg">
  <div class="assess-modal">
    <div class="header">Quick Check</div>
    <div class="q" id="assess-q"></div>
    <div id="assess-opts"></div>
    <div class="foot"><button class="sbtn" id="assess-sub" disabled onclick="submitAssess()">Submit</button></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// DATA: Board sessions with step-by-step teaching sequence
// ══════════════════════════════════════════════════════════════

// Each board has a `sequence` — an ordered list of steps that play out
// like a real teacher. Some steps draw, some speak, some prompt (wait).
// Resources are attached to the board and accumulate in the pane.

const boardSessions = [
  {
    id: 'b1', title: 'Wave-Particle Duality', status: 'completed',
    resources: [
      { type: 'video', label: 'Lecture 3: Photoelectric Effect', time: '2:20 – 6:10', boardIndex: 0 },
    ],
    sequence: [
      { type: 'voice', text: "Let's start with one of the biggest surprises in physics." },
      { type: 'draw', cmd: 'text', text: 'Wave-Particle Duality', x: 140, y: 50, color: 'yellow', size: 32 },
      { type: 'draw', cmd: 'text', text: 'Heisenberg (1927)', x: 200, y: 85, color: 'dim', size: 16 },
      { type: 'pause', ms: 400 },
      { type: 'voice', text: "Light — is it a wave, or a particle? Turns out... it's both." },
      { type: 'draw', cmd: 'line', x1: 40, y1: 110, x2: 700, y2: 110, color: '#2a2e3d', w: 1 },
      { type: 'draw', cmd: 'text', text: 'Evidence for WAVES:', x: 40, y: 150, color: 'cyan', size: 22 },
      { type: 'draw', cmd: 'text', text: '• Interference — Young\'s double slit (1801)', x: 60, y: 185, color: 'white', size: 18 },
      { type: 'draw', cmd: 'text', text: '• Diffraction — light bends around edges', x: 60, y: 215, color: 'white', size: 18 },
      { type: 'pause', ms: 300 },
      { type: 'draw', cmd: 'text', text: 'Evidence for PARTICLES:', x: 40, y: 270, color: 'cyan', size: 22 },
      { type: 'draw', cmd: 'text', text: '• Photoelectric effect — Einstein 1905', x: 60, y: 305, color: 'white', size: 18 },
      { type: 'voice', text: "Einstein showed light comes in packets — photons. Each one carries a specific energy." },
      { type: 'draw', cmd: 'text', text: '• Compton scattering — photons bounce like particles', x: 60, y: 335, color: 'white', size: 18 },
      { type: 'draw', cmd: 'line', x1: 40, y1: 375, x2: 700, y2: 375, color: '#2a2e3d', w: 1 },
      { type: 'draw', cmd: 'text', text: 'E = hf', x: 260, y: 430, color: 'green', size: 32 },
      { type: 'voice', text: "The energy of one photon equals Planck's constant times the frequency." },
      { type: 'draw', cmd: 'text', text: 'energy of one photon = Planck\'s constant × frequency', x: 120, y: 470, color: 'dim', size: 15 },
      { type: 'resource', index: 0 },
      { type: 'voice', text: "Let me show you a clip of Professor Adams demonstrating the photoelectric effect. Watch what happens when he changes the frequency." },
      { type: 'prompt', text: "Watch the clip — what surprised you about the photoelectric effect?" },
    ],
  },
  {
    id: 'b2', title: 'Double Slit Experiment', status: 'completed',
    resources: [],
    sequence: [
      { type: 'voice', text: "Now here's where things get really strange." },
      { type: 'draw', cmd: 'text', text: 'The Double Slit Experiment', x: 100, y: 50, color: 'yellow', size: 32 },
      { type: 'pause', ms: 300 },
      { type: 'voice', text: "Imagine firing electrons — one at a time — at a barrier with two tiny slits." },
      { type: 'draw', cmd: 'text', text: 'Fire electrons ONE AT A TIME', x: 40, y: 100, color: 'white', size: 20 },
      { type: 'draw', cmd: 'rect', x: 320, y: 140, w: 10, h: 70, color: 'white', lw: 2 },
      { type: 'draw', cmd: 'rect', x: 320, y: 250, w: 10, h: 70, color: 'white', lw: 2 },
      { type: 'draw', cmd: 'text', text: 'barrier', x: 300, y: 340, color: 'dim', size: 14 },
      { type: 'draw', cmd: 'text', text: 'electron gun', x: 80, y: 235, color: 'cyan', size: 16 },
      { type: 'draw', cmd: 'text', text: 'detector screen', x: 500, y: 235, color: 'cyan', size: 16 },
      { type: 'pause', ms: 500 },
      { type: 'prompt', text: "What pattern do you think builds up on the detector — two blobs or something else?" },
    ],
  },
  {
    id: 'b3', title: 'The Uncertainty Principle', status: 'active',
    resources: [
      { type: 'video', label: 'Lecture 5: Uncertainty Principle', time: '4:20 – 8:45', boardIndex: 2 },
    ],
    sequence: [
      { type: 'voice', text: "Now let's talk about one of the most famous results in all of physics." },
      { type: 'draw', cmd: 'text', text: 'The Uncertainty Principle', x: 120, y: 50, color: 'yellow', size: 32 },
      { type: 'draw', cmd: 'text', text: 'Heisenberg, 1927', x: 220, y: 85, color: 'dim', size: 16 },
      { type: 'draw', cmd: 'line', x1: 40, y1: 110, x2: 700, y2: 110, color: '#2a2e3d', w: 1 },
      { type: 'pause', ms: 400 },
      { type: 'voice', text: "There's a fundamental limit to how precisely you can know a particle's position and momentum at the same time." },
      { type: 'draw', cmd: 'text', text: 'Δx · Δp  ≥  ℏ/2', x: 180, y: 175, color: 'cyan', size: 34 },
      { type: 'draw', cmd: 'text', text: 'position        momentum', x: 160, y: 210, color: 'dim', size: 14 },
      { type: 'draw', cmd: 'text', text: 'uncertainty     uncertainty', x: 148, y: 230, color: 'dim', size: 14 },
      { type: 'draw', cmd: 'line', x1: 40, y1: 260, x2: 700, y2: 260, color: '#2a2e3d', w: 1 },
      { type: 'pause', ms: 300 },
      { type: 'voice', text: "If you know exactly where a particle is..." },
      { type: 'draw', cmd: 'text', text: 'Know position precisely:', x: 40, y: 300, color: 'white', size: 20 },
      { type: 'draw', cmd: 'rect', x: 80, y: 320, w: 180, h: 60, color: 'cyan', lw: 2 },
      { type: 'draw', cmd: 'text', text: 'narrow Δx', x: 120, y: 400, color: 'cyan', size: 16 },
      { type: 'draw', cmd: 'text', text: '→', x: 310, y: 350, color: 'white', size: 28 },
      { type: 'draw', cmd: 'rect', x: 370, y: 310, w: 250, h: 80, color: 'red', lw: 2 },
      { type: 'draw', cmd: 'text', text: 'huge Δp — momentum all over the place', x: 380, y: 410, color: 'red', size: 16 },
      { type: 'voice', text: "...you lose all information about its momentum. The universe literally doesn't allow both." },
      { type: 'pause', ms: 400 },
      { type: 'draw', cmd: 'text', text: 'This is NOT a measurement limitation.', x: 40, y: 470, color: 'yellow', size: 20 },
      { type: 'draw', cmd: 'text', text: 'It\'s a fundamental property of nature.', x: 40, y: 500, color: 'yellow', size: 20 },
      { type: 'resource', index: 0, flash: true },
      { type: 'voice', text: "Check out this clip — Professor Adams explains it beautifully with a wave packet demo." },
      { type: 'prompt', text: "Before you watch — if Δx gets very small, what does the wave function look like?" },
    ],
  },
];

let activeBoard = 2;
let viewingBoard = 2;
let isReviewing = false;
let seqIndex = {};      // how far each board has played
let drawnCommands = {};  // accumulated draw commands per board

// Init all boards as fully played
boardSessions.forEach((b, i) => {
  seqIndex[i] = b.sequence.length;
  drawnCommands[i] = b.sequence.filter(s => s.type === 'draw');
});

// ══════════════════════════════════════════════════════════════
// RENDERING
// ══════════════════════════════════════════════════════════════

const colorMap = {
  yellow: '#e8d47a', cyan: '#7eb8da', green: '#7ed99a', red: '#e88a7a',
  white: '#d4dbd4', dim: '#5a6055',
};
function c(name) { return colorMap[name] || name || '#d4dbd4'; }

function renderCanvas(bi) {
  const canvas = document.getElementById('board');
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = Math.max(wrap.clientHeight, 700);
  const ctx = canvas.getContext('2d');

  // Blackboard background
  ctx.fillStyle = '#161922';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Subtle grain
  ctx.globalAlpha = 0.015;
  for (let i = 0; i < 800; i++) {
    ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
    ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
  }
  ctx.globalAlpha = 1;

  const cmds = drawnCommands[bi] || [];
  for (const s of cmds) {
    const cmd = s.cmd || s;
    if (cmd === 'text') {
      const sz = s.size || 18;
      const isBig = sz >= 24;
      ctx.font = `${isBig ? '600' : '400'} ${sz}px 'Caveat', cursive`;
      ctx.fillStyle = c(s.color);
      ctx.fillText(s.text, s.x, s.y);
    } else if (cmd === 'line') {
      ctx.strokeStyle = c(s.color);
      ctx.lineWidth = s.w || 1;
      ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
    } else if (cmd === 'rect') {
      ctx.strokeStyle = c(s.color);
      ctx.lineWidth = s.lw || 1;
      ctx.strokeRect(s.x, s.y, s.w, s.h);
    }
  }
}

// ══════════════════════════════════════════════════════════════
// BOARD NAVIGATION & THUMBNAILS
// ══════════════════════════════════════════════════════════════

function renderThumbs() {
  const nav = document.getElementById('board-nav');
  nav.innerHTML = '';
  boardSessions.forEach((b, i) => {
    const div = document.createElement('div');
    div.className = 'board-thumb' + (i === viewingBoard && !isReviewing ? ' active' : '') + (i === viewingBoard && isReviewing ? ' viewing' : '');
    div.onclick = () => switchView(i);
    const tc = document.createElement('canvas'); tc.width = 180; tc.height = 108;
    const tx = tc.getContext('2d');
    tx.fillStyle = '#161922'; tx.fillRect(0, 0, 180, 108);
    tx.scale(180/1200, 108/700);
    for (const s of (drawnCommands[i]||[])) {
      if (s.cmd === 'text') {
        tx.font = `${s.size >= 24 ? 600 : 400} ${s.size||18}px Caveat, cursive`;
        tx.fillStyle = c(s.color); tx.fillText(s.text, s.x, s.y);
      } else if (s.cmd === 'line') {
        tx.strokeStyle = c(s.color); tx.lineWidth = (s.w||1)*2;
        tx.beginPath(); tx.moveTo(s.x1,s.y1); tx.lineTo(s.x2,s.y2); tx.stroke();
      } else if (s.cmd === 'rect') {
        tx.strokeStyle = c(s.color); tx.lineWidth = (s.lw||1)*2;
        tx.strokeRect(s.x,s.y,s.w,s.h);
      }
    }
    tx.setTransform(1,0,0,1,0,0);
    div.appendChild(tc);
    const lbl = document.createElement('div'); lbl.className = 'label'; lbl.textContent = `${i+1}. ${b.title}`;
    div.appendChild(lbl);
    nav.appendChild(div);
  });
}

function switchView(bi) {
  viewingBoard = bi;
  isReviewing = bi !== activeBoard;
  const b = boardSessions[bi];
  document.getElementById('board-badge').textContent = 'BOARD';
  document.getElementById('board-title').textContent = b.title;

  const banner = document.getElementById('review-banner');
  if (isReviewing) {
    document.getElementById('board-status').innerHTML = '📌 Reviewing';
    banner.innerHTML = `Reviewing Board ${bi+1}: ${b.title} <button onclick="switchView(${activeBoard})">← Back to current board</button>`;
    banner.classList.add('visible');
  } else {
    document.getElementById('board-status').innerHTML = '<div class="pulse-dot"></div> Euler is teaching';
    banner.classList.remove('visible');
  }

  // Restore resources for this board
  renderResources(bi);
  renderCanvas(bi);
  renderThumbs();
}

// ══════════════════════════════════════════════════════════════
// RESOURCES PANE — accumulates as tutor invokes them
// ══════════════════════════════════════════════════════════════

function renderResources(bi) {
  const list = document.getElementById('res-list');
  const b = boardSessions[bi];
  list.innerHTML = '';
  if (!b.resources || b.resources.length === 0) {
    document.getElementById('res-pane').classList.remove('open');
    return;
  }
  document.getElementById('res-pane').classList.add('open');
  b.resources.forEach((r, ri) => {
    const item = document.createElement('div');
    item.className = 'resource-item';
    item.id = `res-${bi}-${ri}`;
    item.innerHTML = `
      <div class="thumb">▶<div class="board-label">Board ${(r.boardIndex||bi)+1}</div></div>
      <div class="info"><strong>${r.label}</strong>Prof. Allan Adams<div class="time">${r.time}</div></div>
    `;
    list.appendChild(item);
  });
}

function flashResource(bi, ri) {
  const el = document.getElementById(`res-${bi}-${ri}`);
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth; // reflow
  el.classList.add('flash');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  // Also open pane if closed
  document.getElementById('res-pane').classList.add('open');
}

function toggleResPane() {
  document.getElementById('res-pane').classList.toggle('open');
}

// ══════════════════════════════════════════════════════════════
// LIVE TEACHING SIMULATION — plays sequence step by step
// ══════════════════════════════════════════════════════════════

let playQueue = [];
let playing = false;
let waitingForStudent = false;

function playBoard(bi) {
  activeBoard = bi;
  viewingBoard = bi;
  isReviewing = false;
  drawnCommands[bi] = [];
  seqIndex[bi] = 0;

  const b = boardSessions[bi];
  document.getElementById('board-title').textContent = b.title;
  document.getElementById('board-status').innerHTML = '<div class="pulse-dot"></div> Euler is teaching';
  document.getElementById('review-banner').classList.remove('visible');
  renderResources(bi);

  playQueue = [...b.sequence];
  playing = true;
  waitingForStudent = false;
  playNext();
}

async function playNext() {
  if (!playing || playQueue.length === 0) {
    document.getElementById('writing-ind').classList.remove('visible');
    playing = false;
    return;
  }

  const step = playQueue.shift();
  seqIndex[viewingBoard]++;

  if (step.type === 'draw') {
    document.getElementById('writing-ind').classList.add('visible');
    drawnCommands[viewingBoard].push(step);
    renderCanvas(viewingBoard);
    renderThumbs();
    setTimeout(playNext, 120 + Math.random() * 80);

  } else if (step.type === 'voice') {
    document.getElementById('writing-ind').classList.remove('visible');
    const bubble = document.getElementById('voice-bubble');
    const vt = document.getElementById('voice-text');
    vt.textContent = step.text;
    bubble.classList.remove('hidden');
    // Transcript
    document.getElementById('tr-who').className = 'who tutor';
    document.getElementById('tr-who').textContent = 'Euler';
    document.getElementById('tr-text').textContent = step.text;
    // Hold for reading time (~60ms per char, min 1.5s)
    const dur = Math.max(1500, step.text.length * 50);
    setTimeout(() => {
      bubble.classList.add('hidden');
      setTimeout(playNext, 200);
    }, dur);

  } else if (step.type === 'pause') {
    setTimeout(playNext, step.ms || 400);

  } else if (step.type === 'resource') {
    // Tutor invokes a resource — flash it
    if (step.flash) {
      setTimeout(() => flashResource(viewingBoard, step.index), 300);
    } else {
      document.getElementById('res-pane').classList.add('open');
    }
    setTimeout(playNext, 500);

  } else if (step.type === 'prompt') {
    // Tutor asks — STOP and wait for student
    document.getElementById('writing-ind').classList.remove('visible');
    document.getElementById('voice-bubble').classList.add('hidden');
    document.getElementById('tr-who').className = 'who tutor';
    document.getElementById('tr-who').textContent = 'Euler';
    document.getElementById('tr-text').textContent = step.text;
    document.getElementById('user-input').placeholder = step.text;
    document.getElementById('user-input').focus();
    waitingForStudent = true;
    playing = false; // pause until student responds
  }
}

// ══════════════════════════════════════════════════════════════
// STUDENT INPUT
// ══════════════════════════════════════════════════════════════

function sendMsg() {
  const input = document.getElementById('user-input');
  const msg = input.value.trim();
  if (!msg) return;

  document.getElementById('tr-who').className = 'who student';
  document.getElementById('tr-who').textContent = 'You';
  document.getElementById('tr-text').textContent = msg;
  input.value = '';
  input.placeholder = 'Type your response...';

  if (waitingForStudent) {
    waitingForStudent = false;
    // Simulate tutor reacting then continuing
    setTimeout(() => {
      document.getElementById('tr-who').className = 'who tutor';
      document.getElementById('tr-who').textContent = 'Euler';
      document.getElementById('tr-text').textContent = "Great thinking! Let me continue...";
      const bubble = document.getElementById('voice-bubble');
      document.getElementById('voice-text').textContent = "Great thinking! Let me continue...";
      bubble.classList.remove('hidden');
      setTimeout(() => { bubble.classList.add('hidden'); }, 2000);

      // Continue playing remaining sequence if any
      if (playQueue.length > 0) {
        playing = true;
        setTimeout(playNext, 2200);
      }
    }, 1000);
  }
}

// ══════════════════════════════════════════════════════════════
// ASSESSMENT
// ══════════════════════════════════════════════════════════════

function showAssess() {
  document.getElementById('assess-q').innerHTML = 'An electron is confined to a box of width <em>L</em>. If we halve <em>L</em>, what happens to the minimum momentum uncertainty Δp?';
  const opts = ['It halves', 'It stays the same', 'It doubles', 'It quadruples'];
  document.getElementById('assess-opts').innerHTML = opts.map(o => `<div class="opt" onclick="pickOpt(this)"><div class="r"></div> ${o}</div>`).join('');
  document.getElementById('assess-sub').disabled = true;
  document.getElementById('assess-bg').classList.add('open');
}
function pickOpt(el) {
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('assess-sub').disabled = false;
}
function submitAssess() { document.getElementById('assess-bg').classList.remove('open'); }

// ══════════════════════════════════════════════════════════════
// MISC
// ══════════════════════════════════════════════════════════════

function pickTool(btn) {
  document.querySelectorAll('.draw-tools button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Timer
let t0 = Date.now();
setInterval(() => {
  const s = Math.floor((Date.now()-t0)/1000);
  document.getElementById('timer').textContent = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}, 1000);

// Keyboard demo controls
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === '1') playBoard(0);
  if (e.key === '2') playBoard(1);
  if (e.key === '3') playBoard(2);
  if (e.key === 'a') showAssess();
  if (e.key === 'n') {
    // Tutor creates new board
    const ni = boardSessions.length;
    boardSessions.push({
      id: 'b'+(ni+1), title: 'Quantum Tunneling', status: 'active',
      resources: [],
      sequence: [
        { type: 'voice', text: "Fresh board! Let's explore quantum tunneling." },
        { type: 'draw', cmd: 'text', text: 'Quantum Tunneling', x: 160, y: 50, color: 'yellow', size: 32 },
        { type: 'pause', ms: 400 },
        { type: 'voice', text: "Imagine a ball rolling toward a hill that's taller than its energy should allow it to cross..." },
        { type: 'draw', cmd: 'text', text: 'Classical: ball bounces back', x: 40, y: 120, color: 'white', size: 20 },
        { type: 'draw', cmd: 'text', text: 'Quantum: particle can tunnel through!', x: 40, y: 160, color: 'green', size: 22 },
        { type: 'prompt', text: "Why do you think a quantum particle can do what a classical ball can't?" },
      ],
    });
    boardSessions[activeBoard].status = 'completed';
    drawnCommands[ni] = [];
    seqIndex[ni] = 0;
    playBoard(ni);
  }
});

// Init — render board 3 fully drawn, all thumbs
renderCanvas(activeBoard);
renderResources(activeBoard);
renderThumbs();
window.addEventListener('resize', () => renderCanvas(viewingBoard));
</script>
