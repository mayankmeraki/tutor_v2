JUDGE0_VERSION=1.13.1

REDIS_HOST=judge0-redis
REDIS_PORT=6379
REDIS_PASSWORD=change_me_judge0_redis

POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=change_me_judge0_pg

ENABLE_WAIT_RESULT=true
ENABLE_BATCHED_SUBMISSIONS=true

# Security
ENABLE_NETWORK=false
ENABLE_ADDITIONAL_FILES=false
MAX_CPU_TIME_LIMIT=10
MAX_WALL_TIME_LIMIT=20
MAX_MEMORY_LIMIT=512000
MAX_PROCESSES_AND_OR_THREADS=120
MAX_MAX_FILE_SIZE=4096

# Per-process limits — disables cgroups (required for macOS Docker Desktop)
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=true
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=true

# Workers
RAILS_MAX_THREADS=10
