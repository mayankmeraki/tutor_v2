# ── Voice pricing (per character / per minute) ──
voice:
  elevenlabs_tts:
    provider: "elevenlabs"
    # Turbo v2.5 — used for real-time teaching
    cost_per_1k_chars_usd: 0.30
    model: "eleven_turbo_v2_5"
    description: "ElevenLabs TTS for voice mode"

  elevenlabs_scribe:
    provider: "elevenlabs"
    # Scribe STT — real-time transcription
    cost_per_minute_usd: 0.40
    model: "scribe_v1"
    description: "ElevenLabs Scribe STT"
